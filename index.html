<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernanda V. Chávez | Pentesting Trainee</title>
    <style>
        /* Estética Gótica / Industrial / Noir */
        body {
            background-color: #000000; /* Fondo negro absoluto */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* --- Estilo del Header --- */
        header {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px double #330000; /* Borde sutil oscuro */
            background-color: #050505;
        }

        h1 {
            font-size: 1.4rem;
            letter-spacing: 4px;
            margin: 0;
            color: #ff0000; /* Nombre en rojo para destacar */
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 10px;
            color: #888; /* Gris oscuro para el cargo */
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #990000, transparent);
            margin: 20px auto;
            width: 80%;
        }

        /* --- Estilo de los Links --- */
        .link-block {
            display: block;
            background-color: #990000; /* Rojo sólido */
            color: #000000; /* Texto negro */
            text-decoration: none;
            padding: 18px;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid #990000;
        }

        .link-block:hover {
            background-color: #000000;
            color: #ff0000;
            border: 1px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transform: scale(1.02);
        }

        footer {
            margin-top: 50px;
            font-size: 0.65rem;
            color: #222; /* Casi invisible, para el toque oscuro */
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Fernanda V. Chávez</h1>
            <div class="subtitle">Pentesting Trainee | Cybersecurity</div>
            <div class="divider"></div>
        </header>

        <a href="https://github.com/fernandavch" class="link-block" target="_blank">GitHub Portfolio</a>
        <a href="https://www.linkedin.com/in/fernandavch/" class="link-block" target="_blank">LinkedIn</a>
        <a href="https://www.credential.net/profile/fernandavch/wallet" class="link-block" target="_blank">Accredible Certs</a>
        <a href="https://www.credly.com/users/fernandavch/" class="link-block" target="_blank">Credly Badges</a>

        <footer>
            [ CONNECTION_SECURED ]
        </footer>
    </div>

</body>
</html>
